[pytest]
testpaths = tests
pythonpath = src
addopts = -ra
markers =
    smoke: minimal wiring checks; not sufficient alone for regression
    behavior: observable regression test (preferred for bridge/voice integration)
    unit: pure domain or isolated helper; private methods acceptable
    udp_blackbox: opt-in subprocess UDP integration tests (not yet implemented)
    integration: real HBP/proxy stack (not DeterministicScenario inject)
    mqtt: requires MQTT broker or heavy mqtt mocks

[coverage:run]
source = adn_server
omit =
    */main.py
    */parrot_main.py
    */infrastructure/twisted_adapters/*
    */infrastructure/persistence/*
    */infrastructure/security/*
    */infrastructure/voice/*
    */infrastructure/logging_config.py
    */infrastructure/config_loader.py

[coverage:report]
show_missing = false
precision = 0
skip_empty = true
