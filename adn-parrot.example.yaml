# ADN DMR Parrot (playback) - example configuration
# Copy to adn-parrot.yaml and set real secrets there (never commit adn-parrot.yaml).
#
# The parrot runs as a PEER that connects to the ECHO MASTER (defined in adn-server.yaml).
# When a user transmits to TG 9990, the bridge forwards the call to ECHO, the parrot
# records the audio and plays it back.

GLOBAL:
  PATH: ./
  PING_TIME: 10
  MAX_MISSED: 3
  USE_ACL: true
  REG_ACL: PERMIT:ALL
  SUB_ACL: DENY:1
  TGID_TS1_ACL: PERMIT:ALL
  TGID_TS2_ACL: PERMIT:ALL
  ALLOW_NULL_PASSPHRASE: false
  ANNOUNCEMENT_LANGUAGES: en_GB
  SERVER_ID: 9990
  DATA_GATEWAY: false
  VALIDATE_SERVER_IDS: false

REPORTS:
  REPORT: false
  REPORT_INTERVAL: 60
  REPORT_PORT: 4821
  REPORT_CLIENTS: "127.0.0.1"

LOGGER:
  LOG_FILE: /var/log/adn-server/parrot.log
  LOG_HANDLERS: file-timed
  LOG_LEVEL: DEBUG
  LOG_NAME: ADN

ALIASES:
  TRY_DOWNLOAD: false
  PATH: ./json/
  PEER_FILE: peer_ids.json
  SUBSCRIBER_FILE: subscriber_ids.json
  TGID_FILE: talkgroup_ids.json
  PEER_URL: https://adn.systems/files/peer_ids.json
  SUBSCRIBER_URL: https://adn.systems/files/subscriber_ids.json
  TGID_URL: https://adn.systems/files/talkgroup_ids.json
  LOCAL_SUBSCRIBER_FILE: local_subscriber_ids.json
  STALE_DAYS: 1
  SUB_MAP_FILE: ""
  SERVER_ID_URL: https://adn.systems/files/server_ids.tsv
  SERVER_ID_FILE: server_ids.tsv

SYSTEMS:
  PARROT:
    MODE: PEER
    ENABLED: true
    LOOSE: false
    EXPORT_AMBE: false
    IP: 127.0.0.1
    PORT: 54915                    # parrot local port
    MASTER_IP: 127.0.0.1
    MASTER_PORT: 54917             # must match ECHO.PORT in adn-server.yaml
    PASSPHRASE: "<set-in-adn-parrot.yaml>"   # must match ECHO.PASSPHRASE
    CALLSIGN: ECHO
    RADIO_ID: 9990
    RX_FREQ: 000000000
    TX_FREQ: 000000000
    TX_POWER: 25
    COLORCODE: 1
    SLOTS: 2
    LATITUDE: "00.0000"
    LONGITUDE: "000.0000"
    HEIGHT: 0
    LOCATION: "9990 Parrot"
    DESCRIPTION: ECHO
    URL: adn.systems
    SOFTWARE_ID: "20170620"
    PACKAGE_ID: MMDVM_ADN-Systems
    GROUP_HANGTIME: 5
    OPTIONS: "TS2=9990;"
    USE_ACL: true
    SUB_ACL: DENY:1
    TGID_TS1_ACL: DENY:ALL
    TGID_TS2_ACL: PERMIT:9990
    ANNOUNCEMENT_LANGUAGE: en_GB
    ALLOW_UNREG_ID: true
