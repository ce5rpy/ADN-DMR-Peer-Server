# ADN DMR Echo — minimal PEER config (copy to adn-echo.yaml; do not commit).
#
# Separate process, same binary as adn-server:
#   python adn-server.py --echo -c adn-echo.yaml
#
# Connects to ECHO (MASTER) in adn-server.yaml — match MASTER_PORT and PASSPHRASE.

GLOBAL:
  SERVER_ID: 9990

LOGGER:
  LOG_FILE: /var/log/adn-server/echo.log
  LOG_LEVEL: INFO

SYSTEMS:
  ECHO:
    MODE: PEER
    IP: 127.0.0.1
    PORT: 54915
    MASTER_IP: 127.0.0.1
    MASTER_PORT: 54917              # = ECHO.PORT in adn-server.yaml
    PASSPHRASE: "<match ECHO.PASSPHRASE>"
    RADIO_ID: 9990
    CALLSIGN: ECHO
    OPTIONS: "TS2=9990;"
