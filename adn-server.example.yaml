# ADN DMR Peer Server - example configuration (YAML at project root)
# Copy to adn-server.yaml and set real secrets there (never commit adn-server.yaml).

GLOBAL:
  PATH: ./
  PING_TIME: 10
  MAX_MISSED: 3
  USE_ACL: true
  REG_ACL: PERMIT:ALL
  SUB_ACL: DENY:1
  TGID_TS1_ACL: PERMIT:ALL
  TGID_TS2_ACL: PERMIT:ALL
  GEN_STAT_BRIDGES: true
  ALLOW_NULL_PASSPHRASE: true
  ANNOUNCEMENT_LANGUAGES: ""
  SERVER_ID: 73010
  DATA_GATEWAY: false
  VALIDATE_SERVER_IDS: true
  URL_SECURITY: "<set-in-adn-server.yaml>"
  PORT_SECURITY: "<set-in-adn-server.yaml>"
  PASS_SECURITY: "<set-in-adn-server.yaml>"
  USERS_PASS: user_passwords.json
  HASH_ENCRYPT: encryption_key.secret

REPORTS:
  REPORT: true
  REPORT_INTERVAL: 60
  REPORT_PORT: 4321
  REPORT_CLIENTS: "127.0.0.1"

LOGGER:
  LOG_FILE: /var/log/adn-server/adn-server.log
  LOG_HANDLERS: file-timed
  LOG_LEVEL: INFO
  LOG_NAME: adn-server

ALIASES:
  TRY_DOWNLOAD: true
  PATH: ./
  PEER_FILE: peer_ids.json
  SUBSCRIBER_FILE: subscriber_ids.json
  TGID_FILE: talkgroup_ids.json
  PEER_URL: https://adn.systems/files/peer_ids.json
  SUBSCRIBER_URL: https://adn.systems/files/subscriber_ids.json
  TGID_URL: https://adn.systems/files/talkgroup_ids.json
  LOCAL_SUBSCRIBER_FILE: local_subcriber_ids.json
  STALE_DAYS: 1
  SUB_MAP_FILE: ""
  SERVER_ID_URL: https://adn.systems/files/server_ids.tsv
  SERVER_ID_FILE: server_ids.tsv
  CHECKSUM_URL: https://adn.systems/files/file_checksums.json
  CHECKSUM_FILE: file_checksums.json
  KEYS_FILE: keys.json

ALLSTAR:
  ENABLED: false
  USER: llcgi
  PASS: "<set-in-adn-server.yaml>"
  SERVER: my.asl.server
  PORT: 5038
  NODE: "0000"

# Systems: MASTER, PEER, OPENBRIDGE. Names match legacy [SYSTEM], [D-APRS], [ECHO], [OBP-*].
SYSTEMS:
  SYSTEM:
    MODE: MASTER
    ENABLED: true
    REPEAT: true
    MAX_PEERS: 2
    EXPORT_AMBE: false
    IP: 127.0.0.1
    PORT: 56400
    PASSPHRASE: "<set-in-adn-server.yaml>"
    GROUP_HANGTIME: 5
    USE_ACL: true
    REG_ACL: DENY:1
    SUB_ACL: DENY:1
    TGID_TS1_ACL: PERMIT:ALL
    TGID_TS2_ACL: PERMIT:ALL
    DEFAULT_UA_TIMER: 60
    SINGLE_MODE: false
    VOICE_IDENT: false
    TS1_STATIC: ""
    TS2_STATIC: ""
    DEFAULT_REFLECTOR: 0
    ANNOUNCEMENT_LANGUAGE: es_ES
    GENERATOR: 102
    ALLOW_UNREG_ID: false
    PROXY_CONTROL: false
    OVERRIDE_IDENT_TG: ""

  D-APRS:
    MODE: MASTER
    ENABLED: true
    REPEAT: false
    MAX_PEERS: 2
    EXPORT_AMBE: false
    IP: ""
    PORT: 52555
    PASSPHRASE: "<set-in-adn-server.yaml>"
    GROUP_HANGTIME: 0
    USE_ACL: true
    REG_ACL: DENY:1
    SUB_ACL: DENY:1
    TGID_TS1_ACL: PERMIT:ALL
    TGID_TS2_ACL: PERMIT:ALL
    DEFAULT_UA_TIMER: 10
    SINGLE_MODE: false
    VOICE_IDENT: false
    TS1_STATIC: ""
    TS2_STATIC: ""
    DEFAULT_REFLECTOR: 0
    ANNOUNCEMENT_LANGUAGE: es_ES
    GENERATOR: 2
    ALLOW_UNREG_ID: true
    PROXY_CONTROL: false
    OVERRIDE_IDENT_TG: ""

  ECHO:
    MODE: PEER
    ENABLED: true
    LOOSE: false
    EXPORT_AMBE: false
    IP: 127.0.0.1
    PORT: 54917
    MASTER_IP: 127.0.0.1
    MASTER_PORT: 54915
    PASSPHRASE: "<set-in-adn-server.yaml>"
    CALLSIGN: ECHO
    RADIO_ID: 9990
    RX_FREQ: 449000000
    TX_FREQ: 444000000
    TX_POWER: 25
    COLORCODE: 1
    SLOTS: 1
    LATITUDE: "00.0000"
    LONGITUDE: "000.0000"
    HEIGHT: 0
    LOCATION: "9990 Parrot"
    DESCRIPTION: ECHO
    URL: adn.systems
    SOFTWARE_ID: "20170620"
    PACKAGE_ID: MMDVM_ADN-Systems
    GROUP_HANGTIME: 5
    OPTIONS: ""
    USE_ACL: true
    SUB_ACL: DENY:1
    TGID_TS1_ACL: PERMIT:ALL
    TGID_TS2_ACL: PERMIT:ALL
    ANNOUNCEMENT_LANGUAGE: en_GB

  OBP-TEST:
    MODE: OPENBRIDGE
    ENABLED: false
    IP: ""
    PORT: 62044
    NETWORK_ID: 1
    PASSPHRASE: "<set-in-adn-server.yaml>"
    TARGET_IP: ""
    TARGET_PORT: 62044
    USE_ACL: true
    SUB_ACL: DENY:1
    TGID_ACL: DENY:0-82,92-199,800-899,9990-9999,730999
    RELAX_CHECKS: true
    ENHANCED_OBP: true
    PROTO_VER: 2
