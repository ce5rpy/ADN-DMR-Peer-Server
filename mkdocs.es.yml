# MkDocs — documentación en español. Build: mkdocs build -f mkdocs.es.yml
site_name: ADN Systems
site_description: ADN DMR Peer Server, ADN Monitor, HBP, OpenBridge, self-service.
site_author: ADN Server contributors

docs_dir: docs/es
site_dir: site/es

theme:
  name: material
  language: es
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Modo oscuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Modo claro

plugins:
  - search
  - mermaid2

markdown_extensions:
  - attr_list
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.details

nav:
  - Inicio: README.md
  - Servidor (peer):
      - Guía de usuario:
          - Introducción: server/user-guide/introduction.md
          - Configuración: server/user-guide/configuration.md
          - Talker Alias: server/user-guide/talker-alias.md
          - Bridges y talkgroups: server/user-guide/bridges-and-talkgroups.md
          - Números especiales (4000, 999x, eco): server/user-guide/special-numbers.md
          - Llamadas privadas: server/user-guide/private-calls.md
          - Voz, anuncios y TTS: server/user-guide/voice-and-tts.md
          - Monitor e informes: server/user-guide/monitoring.md
          - Proxy de informes (paneles legacy): server/user-guide/report-proxy.md
          - Proxy hotspot (integrado): server/user-guide/hotspot-proxy.md
          - Echo (reproducción): server/user-guide/echo.md
          - Créditos y licencia: server/user-guide/attribution.md
      - Protocolos:
          - HBP (DMRD): server/protocols/hbp.md
          - OpenBridge (DMRE): server/protocols/openbridge.md
          - Trama DMRE v5: server/protocols/dmre-v5.md
          - Protocolo de informes v2 (JSON): server/protocols/report-v2.md
      - Desarrollo:
          - Arquitectura: server/development/architecture.md
          - Rendimiento (2.x): server/development/performance.md
          - BRIDGES vs Subscriptions: server/development/bridges-vs-subscriptions.md
          - Comportamiento y temporizadores: server/development/behaviour-and-timers.md
          - Enrutado de voz y contención: server/development/routing-and-contention.md
      - Contribuir:
          - Traducciones: server/contributing/translations.md
  - Monitor:
      - Descripción general: monitor/index.md
      - Configuración (adn-monitor.yaml): monitor/configuration.md
      - Proxy hotspot: monitor/hotspot-proxy.md
      - Arquitectura e implantación: monitor/architecture.md
      - Self-service: monitor/self-service.md

extra:
  alternate:
    - name: English
      link: /docs/en/
      lang: en
    - name: Español
      link: /docs/es/
      lang: es
  social: []
